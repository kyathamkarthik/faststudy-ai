<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FastStudy AI | Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 240px; background: white; border-right: 1px solid #e2e8f0; padding: 20px; display: flex; flex-direction: column; }
    .sidebar h2 { color: #16a34a; font-size: 1.2rem; margin-bottom: 20px; }
    .sidebar p { padding: 12px; border-radius: 8px; cursor: pointer; color: #475569; margin: 4px 0; }
    .sidebar p.active { background: #e2e8f0; font-weight: bold; color: #0f172a; }
    .sidebar p:hover { background: #f1f5f9; }

    /* Main Container */
    .main { flex: 1; display: flex; flex-direction: column; padding: 20px; align-items: center; }
    .header-area { width: 100%; max-width: 700px; margin-bottom: 20px; }
    
    /* CHAT AREA (GAME CHANGER) */
    .chat-container { width: 100%; max-width: 700px; flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; scroll-behavior: smooth; }
    
    .message { padding: 14px 18px; border-radius: 15px; margin-bottom: 12px; max-width: 85%; line-height: 1.6; word-wrap: break-word; }
    .user { background: #22c55e; color: white; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.2); }
    .ai { background: white; color: #0f172a; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }

    /* Input Dock */
    .input-dock { width: 100%; max-width: 700px; background: white; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
    input { width: 100%; padding: 12px; border: none; outline: none; font-size: 16px; }
    .btn-group { display: flex; gap: 8px; margin-top: 10px; }
    button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; background: #f1f5f9; color: #475569; }
    button.send { background: #22c55e; color: white; margin-left: auto; }
    button:hover { transform: translateY(-1px); filter: brightness(0.95); }

    .loader-text { font-style: italic; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2 id="user-display">⚡ FastStudy</h2>
  <p onclick="showPage('home')" class="active" id="nav-home">🏠 Chat</p>
  <p onclick="showPage('recents')" id="nav-recents">📜 Recents</p>
  <p onclick="showLogin()" id="nav-login">👤 Profile</p>
  <p onclick="logout()" style="margin-top:auto; color: #ef4444;">🚪 Logout</p>
</div>

<div class="main">
  <div class="header-area">
    <div style="font-size: 20px; font-weight: bold;">AI Study Partner</div>
    <div style="color: #64748b; font-size: 14px;">Focused on solving your engineering doubts.</div>
  </div>

  <div id="chat" class="chat-container">
    <div class="message ai">Hey! I'm ready to help with your exams. What are we studying today?</div>
  </div>

  <div class="input-dock">
    <input id="question" placeholder="Ask anything (Math, Theory, Logic)..." onkeypress="if(event.key === 'Enter') ask('exam')" />
    <div class="btn-group">
      <button onclick="ask('short')">⚡ Short</button>
      <button onclick="ask('exam')">📚 Exam Mode</button>
      <button onclick="ask('explain')">😄 Explain</button>
      <button class="send" onclick="ask('exam')">Send →</button>
    </div>
  </div>
</div>

<script>
let currentUser = localStorage.getItem("user") || null;
const API_URL = "https://faststudy-ai.onrender.com";

window.onload = () => { if(currentUser) document.getElementById("user-display").innerText = "⚡ " + currentUser; };

async function ask(mode) {
  const qInput = document.getElementById("question");
  const q = qInput.value;
  const chat = document.getElementById("chat");

  if (!q.trim()) return;

  // 1. Add User Bubble
  chat.innerHTML += `<div class="message user">${q}</div>`;
  qInput.value = ""; // Clear input
  
  // 2. Add AI Thinking Bubble
  const tempId = "loading-" + Date.now();
  chat.innerHTML += `<div class="message ai" id="${tempId}"><span class="loader-text">⏳ Thinking...</span></div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(`${API_URL}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, mode: mode })
    });
    const data = await res.json();

    // 3. Replace Loader with Real Answer
    document.getElementById(tempId).innerHTML = formatAnswer(data.answer);
    chat.scrollTop = chat.scrollHeight;

    // 4. Cloud Save
    if (currentUser) {
      fetch(`${API_URL}/save`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user: currentUser, question: q, answer: data.answer })
      });
    }
  } catch (err) {
    document.getElementById(tempId).innerText = "❌ Error connecting to server.";
  }
}

function showPage(page) {
  const chat = document.getElementById("chat");
  document.querySelectorAll(".sidebar p").forEach(p => p.classList.remove("active"));
  document.getElementById("nav-" + page).classList.add("active");

  if (page === "home") {
    location.reload(); // Quickest way to reset chat
  } else if (page === "recents") {
    chat.innerHTML = `<div class="message ai">Loading your cloud history...</div>`;
    getRecents().then(html => chat.innerHTML = html);
  }
}

async function getRecents() {
  if (!currentUser) return `<div class="message ai">Please login to see history.</div>`;
  const res = await fetch(`${API_URL}/history/${currentUser}`);
  const data = await res.json();
  return data.map(item => `
    <div class="message ai" style="border-left: 4px solid #22c55e; margin-bottom:20px;">
      <small>PAST QUESTION</small><br>
      <b>Q: ${item.q}</b><hr>
      ${formatAnswer(item.ans)}
    </div>
  `).join("");
}

function formatAnswer(text) {
  return text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\n/g, "<br>");
}

function login() { /* Same as before but update UI */ }
function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
