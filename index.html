<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FastStudy | Adaptive AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; height: 100vh; overflow: hidden; }
    
    /* Sidebar */
    .sidebar { width: 240px; background: white; border-right: 1px solid #e2e8f0; padding: 25px; display: flex; flex-direction: column; }
    .sidebar h2 { color: #22c55e; font-size: 22px; margin-bottom: 30px; }
    .sidebar p { padding: 12px; border-radius: 10px; cursor: pointer; color: #64748b; margin: 5px 0; }
    .sidebar p.active { background: #e2e8f0; color: #0f172a; font-weight: bold; }

    /* Main Area */
    .main { flex: 1; display: flex; flex-direction: column; }
    .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; justify-content: center; }
    .chat-inner { width: 100%; max-width: 750px; display: flex; flex-direction: column; }

    /* Message Bubbles */
    .message { padding: 15px 20px; border-radius: 18px; margin-bottom: 15px; max-width: 80%; line-height: 1.6; }
    .user { background: #22c55e; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .ai { background: white; color: #1e293b; align-self: flex-start; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; }

    /* Controls */
    .input-wrapper { padding: 20px; background: white; border-top: 1px solid #e2e8f0; display: flex; justify-content: center; }
    .input-box { width: 100%; max-width: 750px; display: flex; flex-direction: column; gap: 12px; }
    
    .mode-selector { display: flex; gap: 10px; }
    .mode-selector button { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .mode-selector button.active { background: #22c55e; color: white; border-color: #22c55e; }

    .input-row { display: flex; gap: 10px; }
    input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; outline: none; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2 id="user-display">⚡ FastStudy</h2>
  <p onclick="location.reload()" class="active">🏠 Chat</p>
  <p onclick="showPage('recents')">📜 History</p>
  <p onclick="logout()" style="margin-top:auto; color: #ef4444;">🚪 Logout</p>
</div>

<div class="main">
  <div class="chat-container">
    <div class="chat-inner" id="chat-area">
      <div class="message ai">👋 Ready to start. Select a mode and ask your question!</div>
    </div>
  </div>

  <div class="input-wrapper">
    <div class="input-box">
      <div class="mode-selector">
        <button id="btn-short" onclick="setMode('short')">⚡ Short</button>
        <button id="btn-normal" class="active" onclick="setMode('normal')">📚 Normal</button>
        <button id="btn-max" onclick="setMode('max')">🧠 Max</button>
      </div>
      <p style="font-size:12px; color:#64748b; margin: 0; text-align: center;">⚡ Fast | 📚 Balanced | 🧠 Detailed (Math Ready)</p>
      <div class="input-row">
        <input id="question" placeholder="Ask your question here..." onkeypress="if(event.key === 'Enter') ask()" />
        <button onclick="ask()" style="background:#22c55e; color:white; border:none; padding:0 20px; border-radius:12px; cursor:pointer;">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentMode = "normal";
let currentUser = localStorage.getItem("user") || "Guest";
const API_URL = "https://faststudy-ai.onrender.com";

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-selector button").forEach(btn => btn.classList.remove("active"));
  document.getElementById("btn-" + mode).classList.add("active");
}

async function ask() {
  const qInput = document.getElementById("question");
  const q = qInput.value;
  const chatArea = document.getElementById("chat-area");

  if (!q.trim()) return;

  chatArea.innerHTML += `<div class="message user">${q}</div>`;
  qInput.value = "";
  
  const tempId = "msg-" + Date.now();
  chatArea.innerHTML += `<div class="message ai" id="${tempId}">⏳ Thinking (${currentMode} mode)...</div>`;
  
  try {
    const res = await fetch(`${API_URL}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, mode: currentMode })
    });
    const data = await res.json();

    const aiBubble = document.getElementById(tempId);
    aiBubble.innerHTML = data.answer.replace(/\n/g, "<br>");

    if (window.MathJax) {
      MathJax.typesetPromise([aiBubble]);
    }

    if (currentUser !== "Guest") {
      fetch(`${API_URL}/save`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user: currentUser, question: q, answer: data.answer })
      });
    }
  } catch (err) {
    document.getElementById(tempId).innerText = "❌ Error connecting.";
  }
}

function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
