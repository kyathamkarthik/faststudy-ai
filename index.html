<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FastStudy AI | Math Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    /* Keep all your Chat-style CSS from the previous version here */
    /* (Chat bubbles, Sidebar, Green user message, etc.) */
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; height: 100vh; }
    .sidebar { width: 240px; background: white; border-right: 1px solid #e2e8f0; padding: 20px; display: flex; flex-direction: column; }
    .sidebar h2 { color: #16a34a; font-size: 1.2rem; margin-bottom: 20px; }
    .sidebar p { padding: 12px; border-radius: 8px; cursor: pointer; color: #475569; margin: 4px 0; }
    .sidebar p.active { background: #e2e8f0; font-weight: bold; color: #0f172a; }
    .main { flex: 1; display: flex; flex-direction: column; padding: 20px; align-items: center; }
    .chat-container { width: 100%; max-width: 700px; flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
    .message { padding: 14px 18px; border-radius: 15px; margin-bottom: 12px; max-width: 85%; line-height: 1.6; }
    .user { background: #22c55e; color: white; align-self: flex-end; }
    .ai { background: white; border: 1px solid #e2e8f0; align-self: flex-start; }
    .input-dock { width: 100%; max-width: 700px; background: white; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; }
    input { width: 100%; padding: 12px; border: none; outline: none; }
    button.send { background: #22c55e; color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2 id="user-display">⚡ FastStudy</h2>
  <p onclick="showPage('home')" class="active" id="nav-home">🏠 Chat</p>
  <p onclick="showPage('recents')" id="nav-recents">📜 Recents</p>
  <p onclick="showLogin()" id="nav-login">👤 Profile</p>
  <p onclick="logout()" style="margin-top:auto; color: #ef4444;">🚪 Logout</p>
</div>

<div class="main">
  <div id="chat" class="chat-container">
    <div class="message ai">Math rendering is now ACTIVE. Try asking me for a derivative or a circuit formula!</div>
  </div>

  <div class="input-dock">
    <input id="question" placeholder="Ask a math problem..." />
    <button class="send" onclick="ask('exam')">Solve →</button>
  </div>
</div>

<script>
let currentUser = localStorage.getItem("user") || null;
const API_URL = "https://faststudy-ai.onrender.com";

async function ask(mode) {
  const qInput = document.getElementById("question");
  const q = qInput.value;
  const chat = document.getElementById("chat");

  if (!q.trim()) return;

  chat.innerHTML += `<div class="message user">${q}</div>`;
  qInput.value = "";
  
  const tempId = "loading-" + Date.now();
  chat.innerHTML += `<div class="message ai" id="${tempId}">⏳ Calculating...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch(`${API_URL}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, mode: mode })
    });
    const data = await res.json();

    // STEP 2 & 3: Format and RENDER MATH
    document.getElementById(tempId).innerHTML = formatAnswer(data.answer);
    
    // Trigger MathJax to look for LaTeX in the new message
    if (window.MathJax) {
      MathJax.typesetPromise([document.getElementById(tempId)]).then(() => {
        chat.scrollTop = chat.scrollHeight;
      });
    }

    if (currentUser) {
      fetch(`${API_URL}/save`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user: currentUser, question: q, answer: data.answer })
      });
    }
  } catch (err) {
    document.getElementById(tempId).innerText = "❌ Error rendering answer.";
  }
}

function formatAnswer(text) {
  return text
    .replace(/### (.*)/g, "<h3>$1</h3>")
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
    .replace(/- /g, "• ")
    .replace(/\n/g, "<br>");
}

function showPage(page) { /* logic to switch active tabs */ }
function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
