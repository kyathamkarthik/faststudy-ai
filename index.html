<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FastStudy | Pro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --accent: #4e9cff; --premium: linear-gradient(90deg, #ffd700, #ffa500); }
    body { margin: 0; font-family: 'Google Sans', Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    .sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; padding: 15px; border-right: 1px solid #333; }
    .new-chat { background: #333; padding: 12px 20px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 500; transition: 0.3s; width: fit-content; }
    .new-chat:hover { background: #444; }
    .history-list { flex: 1; margin-top: 30px; overflow-y: auto; font-size: 14px; }
    .history-item { padding: 10px; border-radius: 8px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; color: #aaa; }
    .history-item:hover { background: #2d2e30; color: white; }

    .main { flex: 1; display: flex; flex-direction: column; position: relative; }
    .top-bar { display: flex; justify-content: flex-end; padding: 15px 30px; align-items: center; }
    .profile-circle { width: 35px; height: 35px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid transparent; overflow: hidden; }
    .profile-circle img { width: 100%; height: 100%; object-fit: cover; }

    .chat-view { flex: 1; overflow-y: auto; padding: 0 15%; display: flex; flex-direction: column; scroll-behavior: smooth; }
    .message { margin-bottom: 30px; line-height: 1.6; max-width: 85%; font-size: 16px; }
    .user-msg { align-self: flex-end; background: #2d2e30; padding: 12px 20px; border-radius: 20px; }
    .ai-msg { align-self: flex-start; display: flex; gap: 15px; }
    .ai-msg i { color: var(--accent); margin-top: 5px; }

    .input-container { padding: 20px 15%; background: var(--bg); }
    .input-wrapper { background: #1e1f20; border-radius: 30px; padding: 10px 20px; display: flex; flex-direction: column; border: 1px solid #333; }
    .input-wrapper.image-mode { border: 1px solid #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
    
    .input-top { display: flex; align-items: center; gap: 15px; }
    .input-top input { flex: 1; background: transparent; border: none; color: white; padding: 15px; outline: none; font-size: 16px; }
    .input-bottom { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
    
    .dropdown { position: relative; }
    .dropdown-content { display: none; position: absolute; bottom: 50px; left: 0; background: #2d2e30; min-width: 220px; border-radius: 12px; border: 1px solid #444; z-index: 100; }
    .dropdown-content div { padding: 12px 16px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; }
    .dropdown-content div:hover { background: #3c3d3f; }
    .show { display: block; }

    .pay-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e1f20; padding: 30px; border-radius: 20px; border: 1px solid var(--accent); z-index: 1001; text-align: center; width: 320px; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; }
    .premium-badge { background: var(--premium); color: black; font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: 900; }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closePay()"></div>
<div class="pay-modal" id="pay-modal">
  <i class="fa fa-crown" style="color: gold; font-size: 50px; margin-bottom: 15px;"></i>
  <h2>FastStudy Pro</h2>
  <p>Unlock Image Generation for <b>₹40/month</b></p>
  <button onclick="simulatePayment()" style="background:var(--accent); color:white; border:none; padding:12px; border-radius:20px; width:100%; cursor:pointer; font-weight:bold;">Pay ₹40</button>
</div>

<div class="sidebar">
  <div class="new-chat" onclick="location.reload()"><i class="fa fa-plus"></i> New chat</div>
  <div class="history-list" id="history-list"><p style="color: #666; font-size: 12px; padding-left: 10px;">RECENT</p></div>
  <div style="margin-top:auto; padding:10px; cursor:pointer; font-size: 14px; color:#aaa;" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</div>
</div>

<div class="main">
  <div class="top-bar">
    <div class="profile-circle" id="profile-icon" onclick="loginWithGoogle()">S</div>
  </div>

  <div class="chat-view" id="chat-view">
    <div class="ai-msg">
      <i class="fa fa-robot"></i>
      <div id="welcome-text">Loading...</div>
    </div>
  </div>

  <div class="input-container">
    <div class="input-wrapper" id="input-wrapper">
      <div class="input-top">
        <div class="dropdown">
          <i class="fa fa-plus-circle" onclick="toggleMenu('plus-menu')" style="cursor:pointer; color:#aaa;"></i>
          <div id="plus-menu" class="dropdown-content">
            <div onclick="alert('Coming soon!')"><i class="fa fa-image"></i> Images</div>
            <div onclick="alert('Coming soon!')"><i class="fa fa-file-pdf"></i> PDF Files</div>
          </div>
        </div>
        <input id="user-input" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') ask()" />
        <i class="fa fa-paper-plane" onclick="ask()" style="color:var(--accent); cursor:pointer;"></i>
      </div>
      <div class="input-bottom">
        <div class="dropdown">
          <i class="fa fa-screwdriver-wrench" onclick="toggleMenu('tools-menu')" style="cursor:pointer; color:#aaa;"></i>
          <div id="tools-menu" class="dropdown-content">
            <div onclick="checkPremium('image')"><i class="fa fa-wand-magic-sparkles"></i> Image Gen <span class="premium-badge">PRO</span></div>
          </div>
        </div>
        <select id="mode-select" style="background:transparent; color:#aaa; border:none; outline:none; cursor:pointer;">
          <option value="normal">📚 Normal</option>
          <option value="math">📐 Maths</option>
          <option value="engineering">🛠️ Engineering</option>
          <option value="short">⚡ Short</option>
        </select>
      </div>
    </div>
  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAWk3F8F-3N3tqcBLEimmfizsjgMLH0Xbc",
  authDomain: "faststudy-ai.firebaseapp.com",
  projectId: "faststudy-ai",
  storageBucket: "faststudy-ai.firebasestorage.app",
  messagingSenderId: "417218888685",
  appId: "1:417218888685:web:c18f769b99115b70545de4",
  measurementId: "G-Z4M3JK87EB"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const API_URL = "https://faststudy-ai.onrender.com";

let isPremium = localStorage.getItem("isPremium") === "true";
let isImageMode = false;

window.onload = () => {
  auth.onAuthStateChanged(user => {
    const welcome = document.getElementById("welcome-text");
    const profile = document.getElementById("profile-icon");
    if (user) {
      localStorage.setItem("user", user.displayName);
      profile.innerHTML = `<img src="${user.photoURL}">`;
      welcome.innerHTML = `<b>Hello ${user.displayName}!</b><br>I'm your Smart Assistant. How can I help?`;
      loadHistory(user.displayName);
    } else {
      welcome.innerHTML = `<b>Hello Guest!</b><br>Please <span onclick="loginWithGoogle()" style="color:var(--accent);cursor:pointer;">Login with Google</span> to save history.`;
    }
  });
};

async function loginWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try { await auth.signInWithPopup(provider); location.reload(); } catch (e) { alert("Login Error"); }
}

function logout() { auth.signOut().then(() => { localStorage.clear(); location.reload(); }); }

async function ask() {
  const input = document.getElementById("user-input");
  const q = input.value;
  const mode = document.getElementById("mode-select").value;
  if(!q.trim()) return;

  const chatView = document.getElementById("chat-view");
  chatView.innerHTML += `<div class="message user-msg">${isImageMode ? '🎨 ' : ''}${q}</div>`;
  input.value = "";
  
  const tempId = "ai-" + Date.now();
  chatView.innerHTML += `<div class="message ai-msg" id="${tempId}"><i class="fa fa-sparkles"></i> <div>Thinking...</div></div>`;
  chatView.scrollTop = chatView.scrollHeight;

  const endpoint = isImageMode ? "/generate-image" : "/ask";

  try {
    const res = await fetch(`${API_URL}${endpoint}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, mode: mode })
    });
    const data = await res.json();
    document.getElementById(tempId).innerHTML = `<i class="fa fa-robot"></i> <div>${formatAnswer(data.answer)}</div>`;
    
    if (window.MathJax) MathJax.typesetPromise();
    if (isImageMode) toggleImageMode();
    
    // Save to Cloud History
    const name = localStorage.getItem("user");
    if(name && !isImageMode) {
      fetch(`${API_URL}/save`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user: name, question: q, answer: data.answer })
      });
    }
    chatView.scrollTop = chatView.scrollHeight;
  } catch (e) { document.getElementById(tempId).innerText = "❌ Connection error."; }
}

function formatAnswer(text) { return text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\n/g, "<br>"); }

function toggleImageMode() {
  isImageMode = !isImageMode;
  const wrapper = document.getElementById("input-wrapper");
  const input = document.getElementById("user-input");
  if(isImageMode) {
    wrapper.classList.add('image-mode');
    input.placeholder = "🎨 Describe the image you want...";
  } else {
    wrapper.classList.remove('image-mode');
    input.placeholder = "Ask anything...";
  }
}

function checkPremium(tool) {
  if (!isPremium) {
    document.getElementById("overlay").style.display = "block";
    document.getElementById("pay-modal").style.display = "block";
  } else { toggleImageMode(); }
}

function simulatePayment() { localStorage.setItem("isPremium", "true"); alert("Premium Activated!"); location.reload(); }
function closePay() { document.getElementById("overlay").style.display = "none"; document.getElementById("pay-modal").style.display = "none"; }

function toggleMenu(id) {
  const menu = document.getElementById(id);
  const isShown = menu.classList.contains('show');
  document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
  if (!isShown) menu.classList.add('show');
}

async function loadHistory(name) {
  const res = await fetch(`${API_URL}/history/${name.trim()}`);
  const data = await res.json();
  const list = document.getElementById("history-list");
  data.slice(0, 10).forEach(item => {
    list.innerHTML += `<div class="history-item"><i class="fa-regular fa-message" style="margin-right:10px;"></i> ${item.q.substring(0,25)}...</div>`;
  });
}

window.onclick = (e) => {
  if (!e.target.matches('.fa-plus-circle') && !e.target.matches('.fa-screwdriver-wrench')) {
    document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
  }
}
</script>
</body>
</html>
