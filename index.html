<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FastStudy | Pro Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --accent: #4e9cff; }
    body { margin: 0; font-family: 'Google Sans', Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

    /* Left Sidebar */
    .sidebar { width: 280px; background: var(--sidebar); display: flex; flex-direction: column; padding: 15px; border-right: 1px solid #333; }
    .new-chat { background: #333; padding: 12px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 500; transition: 0.3s; width: fit-content; padding-right: 20px; }
    .new-chat:hover { background: #444; }
    .history-list { flex: 1; margin-top: 30px; overflow-y: auto; font-size: 14px; }
    .history-item { padding: 10px; border-radius: 8px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
    .history-item:hover { background: #2d2e30; }

    /* Main Area */
    .main { flex: 1; display: flex; flex-direction: column; position: relative; }
    
    /* Top Bar */
    .top-bar { display: flex; justify-content: flex-end; padding: 15px 30px; align-items: center; }
    .profile-circle { width: 35px; height: 35px; border-radius: 50%; background: #ff5722; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

    /* Chat View */
    .chat-view { flex: 1; overflow-y: auto; padding: 0 15%; display: flex; flex-direction: column; scroll-behavior: smooth; }
    .message { margin-bottom: 30px; line-height: 1.6; max-width: 85%; font-size: 16px; }
    .user-msg { align-self: flex-end; background: #2d2e30; padding: 12px 20px; border-radius: 20px; }
    .ai-msg { align-self: flex-start; display: flex; gap: 15px; }
    .ai-msg i { color: #4e9cff; margin-top: 5px; }

    /* Floating Input Container */
    .input-container { padding: 20px 15%; background: var(--bg); }
    .input-wrapper { background: #1e1f20; border-radius: 30px; padding: 10px 20px; display: flex; flex-direction: column; border: 1px solid transparent; transition: 0.3s; }
    .input-wrapper:focus-within { border-color: #4e9cff; }
    
    .input-top { display: flex; align-items: center; gap: 15px; }
    .input-top input { flex: 1; background: transparent; border: none; color: white; padding: 15px; outline: none; font-size: 16px; }
    
    .input-bottom { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
    .actions { display: flex; gap: 15px; color: #aaa; }
    .actions i { cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 50%; }
    .actions i:hover { background: #333; color: white; }

    /* Dropdowns/Menus */
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; bottom: 50px; left: 0; background: #2d2e30; min-width: 200px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 100; overflow: hidden; }
    .dropdown-content div { padding: 12px 16px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; }
    .dropdown-content div:hover { background: #3c3d3f; }
    .show { display: block; }

    /* Model Select */
    .model-select { background: transparent; color: #aaa; border: none; cursor: pointer; font-size: 14px; outline: none; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="new-chat" onclick="location.reload()">
    <i class="fa fa-plus"></i> New chat
  </div>
  <div class="history-list" id="history-list">
    <p style="color: #666; padding-left: 10px;">Recent</p>
    </div>
  <div style="margin-top: auto; font-size: 12px; color: #666; padding: 10px;">
    <i class="fa fa-gear"></i> Settings
  </div>
</div>

<div class="main">
  <div class="top-bar">
    <div class="profile-circle" id="profile-icon">S</div>
  </div>

  <div class="chat-view" id="chat-view">
    <div class="ai-msg">
      <i class="fa fa-robot"></i>
      <div>Hello! I'm your Smart Assistant. How can I help you learn today?</div>
    </div>
  </div>

  <div class="input-container">
    <div class="input-wrapper">
      <div class="input-top">
        <div class="dropdown">
          <i class="fa fa-plus-circle" onclick="toggleMenu('plus-menu')" style="font-size: 20px; cursor: pointer;"></i>
          <div id="plus-menu" class="dropdown-content">
            <div onclick="alert('Upload image')"><i class="fa fa-image"></i> Images</div>
            <div onclick="alert('Upload PDF')"><i class="fa fa-file-pdf"></i> Files</div>
            <div onclick="alert('Import Code')"><i class="fa fa-code"></i> Import Code</div>
          </div>
        </div>
        <input id="user-input" placeholder="Type here..." onkeypress="if(event.key === 'Enter') ask()" />
        <i class="fa fa-paper-plane" onclick="ask()" style="color: #4e9cff; cursor: pointer;"></i>
      </div>
      
      <div class="input-bottom">
        <div class="actions">
          <div class="dropdown">
            <i class="fa fa-screwdriver-wrench" onclick="toggleMenu('tools-menu')"></i>
            <div id="tools-menu" class="dropdown-content">
              <div onclick="alert('Generating image...')"><i class="fa fa-wand-magic-sparkles"></i> Image Generation</div>
              <div onclick="alert('Opening Assistant...')"><i class="fa fa-user-graduate"></i> Smart Exam Assistant</div>
            </div>
          </div>
          <i class="fa fa-microphone"></i>
        </div>
        
        <select class="model-select" id="mode-select">
          <option value="normal">📚 Normal</option>
          <option value="short">⚡ Short</option>
          <option value="math">📐 Maths</option>
          <option value="engineering">🛠️ Engineering</option>
        </select>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://faststudy-ai.onrender.com";
let currentUser = localStorage.getItem("user") || "Guest";

// Handle User Display
window.onload = () => {
  document.getElementById("profile-icon").innerText = currentUser[0].toUpperCase();
  loadHistory();
};

function toggleMenu(id) {
  document.querySelectorAll('.dropdown-content').forEach(d => {
    if(d.id !== id) d.classList.remove('show');
  });
  document.getElementById(id).classList.toggle("show");
}

async function ask() {
  const input = document.getElementById("user-input");
  const chatView = document.getElementById("chat-view");
  const mode = document.getElementById("mode-select").value;
  const q = input.value;

  if(!q.trim()) return;

  // Add User UI
  chatView.innerHTML += `<div class="message user-msg">${q}</div>`;
  input.value = "";
  
  // Add Thinking UI
  const tempId = "ai-" + Date.now();
  chatView.innerHTML += `
    <div class="message ai-msg" id="${tempId}">
      <i class="fa fa-sparkles"></i>
      <div class="loader">Thinking...</div>
    </div>`;
  chatView.scrollTop = chatView.scrollHeight;

  try {
    const res = await fetch(`${API_URL}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, mode: mode })
    });
    const data = await res.json();

    document.getElementById(tempId).innerHTML = `
      <i class="fa fa-robot"></i>
      <div>${formatAnswer(data.answer)}</div>`;
    
    if (window.MathJax) MathJax.typeset();
    chatView.scrollTop = chatView.scrollHeight;

  } catch (err) {
    document.getElementById(tempId).innerText = "❌ Error connecting.";
  }
}

function formatAnswer(text) {
  return text.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\n/g, "<br>");
}

async function loadHistory() {
  const res = await fetch(`${API_URL}/history/${currentUser}`);
  const data = await res.json();
  const list = document.getElementById("history-list");
  data.slice(0, 10).forEach(item => {
    list.innerHTML += `<div class="history-item"><i class="fa fa-message"></i> ${item.q}</div>`;
  });
}

// Close menus on click outside
window.onclick = (e) => {
  if (!e.target.matches('.fa-plus-circle') && !e.target.matches('.fa-screwdriver-wrench')) {
    document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show'));
  }
}
</script>
</body>
</html>
