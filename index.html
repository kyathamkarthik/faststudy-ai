<!DOCTYPE html>
<html>
<head>
  <title>FastStudy AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #020617;
      padding: 20px;
      box-sizing: border-box;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .sidebar p {
      color: #94a3b8;
      cursor: pointer;
      margin: 10px 0;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .tagline {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    /* Chat Box */
    .chat-box {
      width: 100%;
      max-width: 700px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .buttons {
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .output {
      background: #020617;
      padding: 20px;
      border-radius: 12px;
      min-height: 100px;
      line-height: 1.6;
    }

    /* Loader */
    .loader {
      border: 4px solid #1e293b;
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      margin: auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    h3 {
      color: #22c55e;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>⚡ FastStudy</h2>
  <p>🏠 Home</p>
  <p>📚 Subjects</p>
  <p>🧠 Practice</p>
  <p>⚙️ Settings</p>
</div>

<!-- Main Content -->
<div class="main">

  <div class="header">AI Study Assistant</div>
  <div class="tagline">⚡ Learn faster. Study smarter.</div>

  <div class="chat-box">

    <input id="question" placeholder="Ask your exam question..." />

    <div class="buttons">
      <button onclick="ask('short')">⚡ Short</button>
      <button onclick="ask('exam')">📚 Exam</button>
      <button onclick="ask('explain')">😄 Explain</button>
    </div>

    <div id="output" class="output">
      Your answer will appear here...
    </div>

  </div>

</div>

<script>
async function ask(mode) {
  const q = document.getElementById("question").value;
  const output = document.getElementById("output");

  if (!q.trim()) {
    output.innerText = "⚠️ Enter a question";
    return;
  }

  output.innerHTML = `<div class="loader"></div>`;

  try {
    const res = await fetch("https://faststudy-ai.onrender.com/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: q,
        mode: mode
      })
    });

    const data = await res.json();

    output.innerHTML = `
      <div>${formatAnswer(data.answer)}</div>
      <button onclick="copyText()" style="margin-top:10px;">📋 Copy</button>
    `;

  } catch (err) {
    output.innerText = "❌ Error connecting to server";
  }
}

function formatAnswer(text) {
  return text
    .replace(/### (.*)/g, "<h3>$1</h3>")
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
    .replace(/- /g, "• ")
    .replace(/\n/g, "<br>");
}

function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
