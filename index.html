<!DOCTYPE html>
<html>
<head>
  <title>FastStudy AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      max-width: 500px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .buttons {
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .output {
      margin-top: 20px;
      padding: 20px;
      background: #020617;
      border-radius: 12px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      line-height: 1.6;
    }

    .loader {
      border: 4px solid #1e293b;
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      margin: auto;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    h3 {
      margin-top: 10px;
      color: #22c55e;
    }
  </style>
</head>

<body>

<h1>⚡ FastStudy AI</h1>

<input id="question" placeholder="Ask your exam question..." />

<div class="buttons">
  <button onclick="ask('short')">⚡ Short</button>
  <button onclick="ask('exam')">📚 Exam</button>
  <button onclick="ask('explain')">😄 Explain</button>
</div>

<div id="output" class="output">Your answer will appear here...</div>

<script>
async function ask(mode) {
  const q = document.getElementById("question").value;
  const output = document.getElementById("output");

  if (!q.trim()) {
    output.innerText = "⚠️ Enter a question bro";
    return;
  }

  output.innerHTML = `<div class="loader"></div>`;

  try {
    const res = await fetch("https://faststudy-ai.onrender.com/ask", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: q,
        mode: mode
      })
    });

    const data = await res.json();

    output.innerHTML = `
      <div>${formatAnswer(data.answer)}</div>
      <button onclick="copyText()" style="margin-top:10px;">📋 Copy</button>
    `;

  } catch (err) {
    output.innerText = "❌ Error connecting to server";
  }
}

function formatAnswer(text) {
  return text
    .replace(/### (.*)/g, "<h3>$1</h3>")
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
    .replace(/- /g, "• ")
    .replace(/\n/g, "<br>");
}

function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
